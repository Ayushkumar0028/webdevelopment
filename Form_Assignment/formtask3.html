<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <h2>Registration Form</h2>
     <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" name="fullname" placeholder ="enter first name">
    <br>
     <label for="Last Name">Last Name:</label>
    <input type="text" id="Last Name" name="Last Name" placeholder ="enter last name">
    <br>
    <label for="Email">Email:</label>
    <input type="text" id="Email" name="Email" placeholder ="enter email address">
    <br>
    <label for="Password">Password:</label>
    <input type="password" id="Password" name="Password" placeholder ="enter password">
    <br>
    <label for="Gender">Gender:</label>
    <br>
    <input  type="radio" id="Male" name="gender" value="Male"  >
    <label for="Male">Male</label>
    <br>
    <input  type="radio" id="Female" name="gender" value="Female"  >
    <label for="Female">Female</label>
    <br>
    <input  type="radio" id="Other" name="gender" value="Other"  >
    <label for="Other">Other</label>
    <br>
     <label for="Age">Age:</label>
    <input type="date" id="Age" name="Age">
    <br>
    <label for="Preference">Preference:</label>
    <br>
    <input  type="checkbox" id="Acrylic Painting" name="Acrylic Painting" value="Male"  >
    <label for="Acrylic Painting">Acrylic Painting</label>
    <br>
    <input  type="checkbox" id="Oil Painting" name="Oil Painting" value="Female"  >
    <label for="Oil Painting">Oil Painting</label>
    <br>
    <input  type="checkbox" id="Water color Painting" name="Water color Painting" value="Other"  >
    <label for="Water color Painting">Water color Painting</label>
    <br>
     <label for="Select Occupation">Select Occupation:</label>
    
    <select>
        <option>Student</option>
        <option value="Ayush">Ayush</option>
        <option value="Bhanu">Bhanu</option>
        <option value="Devendra">Devendra</option>
        <option value="Ankush">Ankush</option>  
    </select>
    <br>
    <label>Bio:</label>
    <br>
        <textarea rows ="4" cols ="30" placeholder="add your address" >  
          
    </textarea>
<br>
    <button type="RESET">RESET</button>  
        <button type="SUBMIT">SUBMIT</button>    
  

    <br>

    



    
</body>
</html>
